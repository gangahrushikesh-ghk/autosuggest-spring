<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
    <title>Autosuggest</title>
</head>
<body>
    <h1>Hello, World!</h1>
    
    <div class="navbar">
        <a href="https://autosuggest-spring-qeu8.onrender.com/">Home</a>
        <a href="https://github.com">GitHub</a>
        <a href="https://leetcode.com">Leetcode</a>
        <a href="https://autosuggest-spring-qeu8.onrender.com/">Autosuggest</a>
    </div>

    <div class="card">
        <!-- Note: Local paths like C:\ only work on your machine. Consider using relative paths later. -->
        <img src="john.png" alt="image not found">
        <h3 id="username">hrushikesh</h3>
        <p id="gender">Male</p>
        <button>Toggle user</button>
        <button>Random User</button>
    </div>

    <audio id="bg-music" loop>
        <source src="khaleja_bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Plays background music on the first user interaction to bypass browser autoplay blocks
        document.addEventListener('click', function() {
            var audio = document.getElementById('bg-music');
            audio.play().catch(function(error) {
                console.log("Audio playback failed:", error);
            });
        }, { once: true });
    </script>
</body>
</html>
