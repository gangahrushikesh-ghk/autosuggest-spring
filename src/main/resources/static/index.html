<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
    <title>Autosuggest</title>
    
    <style>
        /* Video Background CSS */
        .video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1000; /* Pushes the video behind all other content */
            background-size: cover;
            object-fit: cover; /* Prevents video distortion */
        }

        /* Ensuring content stays legible over a moving background */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .card, .navbar {
            position: relative;
            z-index: 1; /* Keeps content layered above the video */
        }
    </style>
</head>
<body>

    <!-- Background Video Section -->
    <!-- 'autoplay loop muted playsinline' are required for background videos to work across all mobile & desktop browsers -->
    <video autoplay loop muted playsinline class="video-background">
        <source src="gun_background.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <h1>Hello, World!</h1>
    
    <div class="navbar">
        <a href="https://autosuggest-spring-qeu8.onrender.com/">Home</a>
        <a href="https://github.com">GitHub</a>
        <a href="gitpulse.html">GitPulse</a>
        <a href="codeforces-stats.html">Codeforces</a>
        <a href="leetcode-stats.html">Leetcode</a>
        <a href="https://www.codechef.com">Codechef</a>
        <a href="ask-gemini.html">ask Gemini</a>
        <a href="https://autosuggest-spring-qeu8.onrender.com/">Autosuggest</a>

    </div>

    <div class="card">
        <img src="john.png" alt="image not found" id="user-image">
        <h3 id="user-name">prabhas</h3>
        <p id="user-gender">Male</p>
        <button onclick="toggleUser()">Toggle user</button>
        <button onclick="randomUser()">Random User</button>
    </div>

    <audio id="bg-music" loop>
        <source src="khaleja_bgm.mp3" type="audio/mp3">
    </audio>

    <script>
        // Plays background music on the first user interaction to bypass browser autoplay blocks
        document.addEventListener('click', function() {
            var audio = document.getElementById('bg-music');
            audio.play().catch(function(error) {
                console.log("Audio playback failed:", error);
            });
        }, { once: true });
    </script>
</body>
</html>
