<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Autosuggest</title>
    <style>
        body {
            /* Set the background image */
            background-image: url('https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcS7sj0XKLo6d_GOlnf-Z_CZmOCEupGixkmi1OYmNZSxyELGglhS33EYswYxdA_GqyK8V4xbWpViYjLuYe8');
            
            /* Make sure the image covers the entire screen nicely */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            /* Give it a min-height so the background fills the viewport */
            margin: 0;
            height: 100vh;
            
            /* Optional styling to make your heading stand out over the image */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-size: 3rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Hello, World!</h1>
</body>
</html>
